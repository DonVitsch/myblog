# -------------------------------------------------------------------------------------
# Hugo Configuration
# -------------------------------------------------------------------------------------

# 网站标题
title = "DonVitsch's Blog"

# 你的域名
baseURL = "https://donvitsch.blog/"

# [关键修改] 使用 Hugo 模块化引入主题，不再依赖本地 themes 文件夹
[module]
  [[module.imports]]
    path = "github.com/hugo-fixit/FixIt"

# 默认语言
defaultContentLanguage = "zh-cn"
languageCode = "zh-cn"
languageName = "简体中文"

# 其他设置保持不变
hasCJKLanguage = true
copyright = "© 2026 DonVitsch"
enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true
mainSections = ["posts"]
