baseURL = "https://donvitsch.blog/"
title = "DonVitsch's Blog"
theme = "github.com/adityatelange/hugo-PaperMod"

defaultContentLanguage = "zh-cn"
languageCode = "zh-cn"

[params]
    env = "production"
    title = "DonVitsch's Blog"
    description = "宝宝不哭喝面条吧"
    author = "DonVitsch"

    # --- 关键：个人资料模式 (首页大头像) ---
    [params.profileMode]
        enabled = true
        title = "DonVitsch"
        subtitle = "宝宝不哭喝面条吧 🍜"
        displayFullContent = true
        # 只要你 static 目录下有这张图，它必出！
        imageUrl = "avatar.jpg" 
        imageWidth = 120
        imageHeight = 120

    # --- 社交链接 ---
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/DonVitsch"