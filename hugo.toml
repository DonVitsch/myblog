baseURL = "https://donvitsch.blog/"
title = "DonVitsch's Blog"
theme = "github.com/hugo-fixit/FixIt"

defaultContentLanguage = "zh-cn"
languageCode = "zh-cn"

# 强制编译所有隐藏状态
buildDrafts = true
buildFuture = true

# 作者基本信息
[author]
  name = "DonVitsch"

# 全局参数配置（所有的参数都放在这一个标签下面）
[params]
  themeStyle = "auto"

  # 个人资料页配置 (侧边栏头像和简介)
  [params.profile]
    enable = true
    avatarURL = "/avatar.jpg"
    title = "DonVitsch"
    subtitle = "宝宝不哭喝面条吧" # 很有个性的简介！
    avatarCircle = true
    social = true
    typeit = true