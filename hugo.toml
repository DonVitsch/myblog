baseURL = "https://donvitsch.blog/"
title = "DonVitsch's Blog"
theme = "github.com/hugo-fixit/FixIt"

defaultContentLanguage = "zh-cn"
languageCode = "zh-cn"

# 强制编译所有隐藏状态
buildDrafts = true
buildFuture = true

# 作者基本信息
[author]
  name = "DonVitsch"
  link = "https://donvitsch.blog/"

# 全局参数配置
[params]
  themeStyle = "auto"

  # --- 侧边栏配置 (让头像出来的关键) ---
  [params.sidebar]
    enable = true          # 开启侧边栏
    position = "left"      # 放在左边
    profile = true         # 在侧边栏显示个人资料
    sticky = true          # 页面滚动时侧边栏固定住

  # --- 个人资料页配置 ---
  [params.profile]
    enable = true
    avatarURL = "/avatar.jpg" # 确保 static 目录下有这个文件
    title = "DonVitsch"
    subtitle = "宝宝不哭喝面条吧"
    avatarCircle = true    # 头像切成圆形
    social = true          # 开启社交图标显示
    typeit = true          # 开启简介打字机效果

  # --- 社交链接配置 (图标会自动出现) ---
  [params.social]
    GitHub = "DonVitsch"   # 只需填入你的 GitHub 用户名