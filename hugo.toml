baseURL = "https://donvitsch.blog/"
title = "DonVitsch's Blog"
theme = "github.com/adityatelange/hugo-PaperMod"

defaultContentLanguage = "zh-cn"
languageCode = "zh-cn"

# 强制编译草稿和未来的文章
buildDrafts = true
buildFuture = true

[params]
    env = "production"
    title = "DonVitsch's Blog"
    description = "宝宝不哭喝面条吧"
    author = "DonVitsch"

    # --- 方案 2：关闭全屏模式，开启首页信息模式 ---
    [params.profileMode]
        enabled = false  # 必须关闭这个，文章列表才会出来

    [params.homeInfoParams]
        Title = "DonVitsch 🍜"
        Content = "宝宝不哭喝面条吧。欢迎来到我的碎碎念空间，这里有铁娘子，也有生活。"

    # --- 显示社交图标 ---
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/DonVitsch"

    # --- 文章显示设置 ---
    [params.assets]
        disableHLJS = false # 开启代码高亮
    
    [params.label]
        text = "DonVitsch's Blog"
        # 这里的头像会出现在左上角标题旁边，很精致
        icon = "/avatar.jpg" 
        iconHeight = 35

# --- 导航菜单配置 ---
[[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10

[[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 20

[[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 30