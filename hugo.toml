baseURL = "https://donvitsch.blog/"
title = "DonVitsch's Blog"
theme = "github.com/hugo-fixit/FixIt"

defaultContentLanguage = "zh-cn"
languageCode = "zh-cn"
hasCJKLanguage = true

[params]
  themeStyle = "auto"

# ==========================================
# 终极绝杀：强制开启“个人主页”模式
# ==========================================
[params.home]
  profileMode = true

[params.home.profile]
  enable = true
  avatarURL = "/images/avatar.png" # 就算你还没传图，它也会先显示个占位符
  title = "DonVitsch"
  subtitle = "单宁、代码与生活"
