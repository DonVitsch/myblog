baseURL = "https://donvitsch.blog/"
title = "DonVitsch's Blog"
theme = "github.com/hugo-fixit/FixIt"

defaultContentLanguage = "zh-cn"
languageCode = "zh-cn"

# 强制编译所有隐藏状态
buildDrafts = true
buildFuture = true

# 作者基本信息
[author]
  name = "DonVitsch"
  link = "https://donvitsch.blog/"

# 全局参数配置
[params]
  themeStyle = "auto"

  # --- 侧边栏配置 (让头像出来的关键) ---
  [params.sidebar]
    enable = true          
    position = "left"      
    profile = true         
    sticky = true          

  # --- 个人资料页配置 ---
  [params.profile]
    enable = true
    avatarURL = "/avatar.jpg" 
    title = "DonVitsch"
    subtitle = "宝宝不哭喝面条吧"
    avatarCircle = true    
    social = true         
    typeit = true         

  # --- 社交链接配置 (图标会自动出现) ---
  [params.social]
    GitHub = "DonVitsch"  